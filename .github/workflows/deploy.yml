name: Deploy to Production (Coolify)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Trigger Coolify Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify deploy via API
        run: |
          response=$(curl --fail --silent --show-error -X GET \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
            "http://212.227.207.43:8000/api/v1/deploy?uuid=ti6qdeom11qycsf3ky5fka7w&force=false")
          echo "Coolify response: $response"
