[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = [
  "corepack enable && corepack prepare pnpm@10.19.0 --activate && pnpm install --filter @acme/nextjs..."
]

[phases.build]
cmds = ["pnpm --filter @acme/nextjs run build"]

[start]
cmd = "node apps/nextjs/.next/standalone/apps/nextjs/server.js"
